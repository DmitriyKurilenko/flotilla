# File Browser — https://github.com/filebrowser/filebrowser
# Single-service Go app with a persistent volume for its database.
# Tests the auto-cert shortcut form + volume persistence.
services:
  app:
    image: filebrowser/filebrowser:latest
    restart: unless-stopped
    expose:
      - "80"
    volumes:
      - filebrowser_data:/database
    environment:
      FB_ROOT: /srv
      FB_DATABASE: /database/filebrowser.db

volumes:
  filebrowser_data:
    driver: local
